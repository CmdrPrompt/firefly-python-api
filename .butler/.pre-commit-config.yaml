repos:
  - repo: https://github.com/astral-sh/ruff-pre-commit
    rev: v0.15.20
    hooks:
      - id: ruff
        args: [--fix]
      - id: ruff-format
  - repo: local
    hooks:
      - id: validate-agents
        name: Validate .claude/agents frontmatter
        entry: python3 scripts/validate_agents.py .claude/agents
        language: system
        files: ^\.claude/agents/.*\.agent\.md$
        pass_filenames: false